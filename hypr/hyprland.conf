############
# swaydots — Hyprland starter (Waybar autostart + basics)
# Full reference: https://wiki.hyprland.org/Configuring/
############

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = waybar
# If polkit prompts never appear: rpm -ql polkit-gnome | grep -i auth — adjust path below
exec-once = /usr/libexec/polkit-gnome-authentication-agent-1

monitor=,preferred,auto,auto

$terminal = kitty
bind = SUPER, Return, exec, $terminal
bind = SUPER, A, exec, fuzzel
bind = SUPER SHIFT, Q, exit,

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
}

input {
    kb_layout = us
}
