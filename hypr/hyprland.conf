############
# swaydots — Hyprland (keybind parity with ~/.config/sway/config)
# https://wiki.hyprland.org/Configuring/
############

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = waybar
exec-once = /usr/libexec/polkit-mate-authentication-agent-1
exec-once = easyeffects --hide-window
exec-once = $HOME/.config/sway/wallpaper-restore.sh
exec-once = /bin/bash $HOME/.config/hypr/first-boot-welcome.sh

monitor = , preferred, auto, auto

workspace = special:scratchpad

# Match Sway: workspace → output (uncomment and set names from `hyprctl monitors`)
# workspace = 1, monitor:DP-2
# workspace = 2, monitor:HDMI-A-1

$terminal = kitty
$browser = helium
$filemanager = thunar

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    layout = dwindle
}

dwindle {
    pseudotile = true
    preserve_split = true
}

animations {
    enabled = true

    # Fast profile: short, crisp transitions.
    bezier = snappy, 0.12, 0.95, 0.18, 1.0
    animation = windows, 1, 2, snappy, slide
    animation = windowsOut, 1, 2, snappy, slide
    animation = border, 1, 3, default
    animation = fade, 1, 2, default
    animation = workspaces, 1, 2, snappy, slide
}

input {
    kb_layout = us
}

# ── Basics (same roles as Sway: Mod = SUPER) ─────────────────
bind = SUPER, Return, exec, $terminal
bind = SUPER, Q, killactive,
bind = SUPER, A, exec, fuzzel
bind = SUPER SHIFT, T, exec, /bin/bash $HOME/.config/sway/theme-switch.sh
bind = SUPER, B, exec, $browser
bind = SUPER, E, exec, $filemanager
bind = SUPER, V, exec, pavucontrol

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

bind = SUPER SHIFT, C, exec, hyprctl reload

bind = SUPER, W, exec, $HOME/.config/sway/wallpaper-picker.py
bind = SUPER SHIFT, W, exec, $HOME/.config/sway/wallpaper.sh

bind = SUPER SHIFT, E, exec, wlogout

# ── Focus & move (vim hjkl + arrows) ────────────────────────
bind = SUPER, H, movefocus, l
bind = SUPER, J, movefocus, d
bind = SUPER, K, movefocus, u
bind = SUPER, L, movefocus, r

bind = SUPER, left, movefocus, l
bind = SUPER, down, movefocus, d
bind = SUPER, up, movefocus, u
bind = SUPER, right, movefocus, r

bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, J, movewindow, d
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, L, movewindow, r

bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, down, movewindow, d
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, right, movewindow, r

# ── Workspaces 1–10 ────────────────────────────────────────
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# ── Layout (dwindle ↔ Sway splits / stacking / tabbed / toggle) ──
bind = SUPER SHIFT, B, layoutmsg, preselect r
bind = SUPER SHIFT, V, layoutmsg, preselect d
bind = SUPER, S, togglesplit
bind = SUPER, Y, pseudo,
bind = SUPER, T, togglesplit

bind = SUPER, F, fullscreen,
bind = SUPER SHIFT, SPACE, togglefloating,
# Sway: Mod+space = focus mode_toggle — Hyprland: cycle windows on same workspace
bind = SUPER, SPACE, cyclenext,

# ── Scratchpad (special workspace) ─────────────────────────
bind = SUPER SHIFT, minus, movetoworkspace, special:scratchpad
bind = SUPER, minus, togglespecialworkspace, special:scratchpad

# ── Resize mode (Sway $mod+r) ───────────────────────────────
bind = SUPER, R, submap, resize
submap = resize
binde = , h, resizeactive, -20 0
binde = , l, resizeactive, 20 0
binde = , k, resizeactive, 0 -20
binde = , j, resizeactive, 0 20
binde = , left, resizeactive, -20 0
binde = , right, resizeactive, 20 0
binde = , up, resizeactive, 0 -20
binde = , down, resizeactive, 0 20
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# ── Screenshots (same scripts as Sway; grim + slurp) ───────
bind = , Print, exec, $HOME/.config/sway/screenshot-full.sh
bind = SHIFT, Print, exec, $HOME/.config/sway/screenshot-region.sh

# ── Essential media / hardware keys ─────────────────────────
binde = , XF86AudioRaiseVolume, exec, $HOME/.config/sway/volume-osd.sh up
binde = , XF86AudioLowerVolume, exec, $HOME/.config/sway/volume-osd.sh down
bind = , XF86AudioMute, exec, $HOME/.config/sway/volume-osd.sh mute
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind = , XF86MonBrightnessUp, exec, brightnessctl set +10%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
