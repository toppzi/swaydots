# Start Waybar when Sway starts.
#
# Fedora’s sway package often ships no bar snippet (only systemd helpers under
# /etc/sway/config.d). Without an explicit exec, Waybar never runs even though
# ~/.config/waybar is installed.
#
# If you ever see two bars, another snippet may also be starting Waybar — remove
# this file or add an empty ~/.config/sway/config.d/90-bar.conf to override a
# distro bar config (see comments in ~/.config/sway/config).
exec waybar
